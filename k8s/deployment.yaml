apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  labels:
    app: demo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
        - name: demo-api
          # 1er CAMBIO AQUI: Cambiamos :latest por un tag específico
          image: alonsom10/demo-api:v2.0.0 
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              # 2do CAMBIO AQUI: Subimos el límite de 128Mi a 256Mi
              memory: "256Mi"
